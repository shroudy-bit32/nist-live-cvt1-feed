# Force refresh workflow parsing
name: 24h Clean Hash Sync Pipeline

on:
  schedule:
    - cron: '0 0 * * *' # Automatically runs every night at 00:00 UTC
  workflow_dispatch: # Allows manual trigger from the GitHub web UI at any time

# Default GITHUB_TOKEN is read-only; release upload needs contents:write.
permissions:
  contents: write

env:
  RELEASE_TAG: latest-feed

jobs:
  # -------------------------------------------------------------------------
  # 1) Full NIST modern carve → CVT1 .bin packs only (heavy job)
  # -------------------------------------------------------------------------
  build-bins:
    runs-on: ubuntu-latest
    # Full modern.zip stream + carve can take several hours on free runners.
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout Monorepo Source Code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Runtime Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Full-Scan Stream Parser
        run: |
          # Auto-discovers newest full RDS_*_modern.zip (skips minimal/delta).
          # Exact online unique → CVT1 .bin under ./clean_packs
          python tools/stream_http_hash_filter.py --latest-modern -o clean_packs

      - name: Deploy CVT1 Binary Packs to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Latest Clean Hash Feed (CVT1 Packs)"
          body: |
            Automated zero-footprint binary hash feed (CVT1).

            - `.bin` packs are produced by the full modern RDS carve job.
            - DFIR `.txt` lists (Magnet AXIOM / FTK) are attached by follow-up
              jobs that convert one algorithm at a time from these binaries
              (keeps free-runner disk under the limit).
          make_latest: true
          files: |
            clean_packs/clean_md5.bin
            clean_packs/clean_sha1.bin
            clean_packs/clean_sha256.bin
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------------
  # 2) Per-algo DFIR text export (light jobs; one .bin + one .txt on disk)
  # -------------------------------------------------------------------------
  export-txt:
    name: Export ${{ matrix.pack }}.txt
    needs: build-bins
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        pack:
          - clean_sha256
          - clean_sha1
          - clean_md5

    steps:
      - name: Checkout Monorepo Source Code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download ${{ matrix.pack }}.bin from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p clean_packs
          gh release download "${{ env.RELEASE_TAG }}" \
            --pattern "${{ matrix.pack }}.bin" \
            --dir clean_packs \
            --clobber

      - name: Convert ${{ matrix.pack }}.bin → .txt
        run: |
          # Single-pack convert keeps peak disk ≈ one bin + one txt
          python tools/cvt1_to_text.py -i clean_packs -o clean_packs \
            "${{ matrix.pack }}.bin"

      - name: Attach ${{ matrix.pack }}.txt to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ env.RELEASE_TAG }}" \
            "clean_packs/${{ matrix.pack }}.txt" \
            --clobber
