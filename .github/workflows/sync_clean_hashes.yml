# Force refresh workflow parsing
name: 24h Clean Hash Sync Pipeline

on:
  schedule:
    - cron: '0 0 * * *' # Automatically runs every night at 00:00 UTC
  workflow_dispatch: # Allows manual trigger from the GitHub web UI at any time

# Default GITHUB_TOKEN is read-only; release upload needs contents:write.
permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Monorepo Source Code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Runtime Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute In-Memory Stream Parser
        run: |
          # Auto-discovers newest full RDS_*_modern.zip (skips minimal/delta),
          # then streams it into native CVT1 packs under ./clean_packs
          python tools/stream_http_hash_filter.py --latest-modern -o clean_packs

      - name: Export DFIR-Compatible Text Hash Lists
        run: |
          # CVT1 .bin → one-hex-digest-per-line .txt (Magnet AXIOM / FTK / etc.)
          python tools/cvt1_to_text.py -i clean_packs -o clean_packs

      - name: Deploy Native CVT1 Binary Feed to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-feed
          name: "Latest Clean Hash Feed (CVT1 Packs)"
          body: "Automated 24h zero-footprint binary hash feed generation for the core scanning engine. Includes DFIR-compatible plain-text hash lists for Magnet AXIOM / FTK."
          make_latest: true
          files: |
            clean_packs/clean_md5.bin
            clean_packs/clean_sha1.bin
            clean_packs/clean_sha256.bin
            clean_packs/clean_md5.txt
            clean_packs/clean_sha1.txt
            clean_packs/clean_sha256.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
